<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>KeeperAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="backdrop backdrop-a"></div>
  <div class="backdrop backdrop-b"></div>

  <div class="shell">
    <header class="topbar">
      <div class="brand-block">
        <div>
          <div class="brand">KeeperAgent</div>
          <p class="tagline">Your onchain automation assistant. Talk to KeeperHub in plain English.</p>
        </div>
      </div>
      <div class="status-cluster">
        <div class="badge" id="modelBadge">Powered by Gemini 2.5 Flash · ElizaOS</div>
      </div>
    </header>

    <section class="banner" id="networkBanner" hidden></section>

    <main class="chat-shell">
      <section class="messages" id="messageList" aria-live="polite" aria-relevant="additions"></section>
    </main>

    <section class="composer-wrap">
      <form class="composer" id="composerForm">
        <textarea id="messageInput" rows="1"
          placeholder="Ask KeeperAgent to manage workflows, executions, or onchain actions..."></textarea>
        <button class="cta-button send-button" id="sendButton" type="submit">Send</button>
      </form>
    </section>
  </div>

  <script src="./app.js" type="module"></script>
</body>

</html>
